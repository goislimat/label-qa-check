name: QA Label Check

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize]

jobs:
  check-qa-label:
    runs-on: ubuntu-latest
    steps:
      - name: Verify QA Label for DM Tasks
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;
            const labels = pr.labels.map(l => l.name);

            if (title.toLowerCase().includes('dm-')) {
              if (labels.includes('QAed')) {
                console.log('QA requirement met.');
              } else {
                core.setFailed('PRs with "DM-" in the title require the "QAed" label to merge.');
              }
            } else {
              console.log('No "DM-" substring found. Skipping check.');
            }
